<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofivoz</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="app-container" id="app">
    <!-- Login Overlay -->
    <div class="login-overlay active" id="loginOverlay">
      <div class="login-box glass-panel">
        <h1>Welcome to<br><span class="accent-text">Ofivoz</span></h1>
        <p>Tu oficina remota sin fricciones.</p>
        <div class="input-group">
          <input type="text" id="usernameInput" placeholder="Enter your name" autocomplete="off" />
        </div>
        <button id="joinBtn" class="btn primary-btn">Enter Office</button>
      </div>
    </div>

    <!-- Main Workspace -->
    <div class="workspace" id="workspace" style="display: none;">
      <header class="header glass-panel">
        <div class="status-indicator">
          <div class="pulse-dot"></div>
          <span>Connected to Live Room</span>
        </div>
        <h2 id="currentUserDisplay"></h2>
      </header>

      <div class="main-content">
        <!-- Small Corner Broadcast Button -->
        <button id="gritoBtn" class="btn grito-small" title="Mantén presionado para hablar a todos">
          ⚠️ ALERTA (Grito)
        </button>
        
        <div class="presence-panel glass-panel">
          <h3>👥 Oficina General</h3>
          <ul id="generalUserList" class="user-list">
            <!-- Users not in any sub-room -->
          </ul>

          <h3 class="mt-3" style="color: var(--whisper-color);">🔒 Salas Activas</h3>
          <div id="roomsContainer" class="rooms-container">
            <!-- Dynamic Sub-rooms populated here -->
          </div>
        </div>
        
        <!-- Toast Notification Panel -->
        <div id="toastNotification" class="glass-panel hidden" style="position: absolute; bottom: 20px; right: 20px; border-color: var(--whisper-color); z-index: 1000; animation: slideUp 0.3s ease;">
          <h4 style="color: var(--text-primary); font-size: 1rem; margin-bottom: 4px;">Nueva Sub-sala 💬</h4>
          <p id="toastMessage" style="color: var(--text-secondary); margin: 0; font-size: 0.9rem;">Mensaje</p>
        </div>
        
        <div class="controls-panel glass-panel">
          <div class="audio-visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          
          <button id="muteBtn" class="huge-mute muted">
            <span>🔇 MIC OFF</span>
          </button>
        </div>
      </div>

      <!-- Whisper Target Selection Modal (Old, can keep) -->
      <div id="whisperModal" class="whisper-modal hidden">
        <div class="glass-panel text-center">
          <h3>Select Whisper Targets</h3>
          <div id="whisperTargets" class="checkbox-list"></div>
          <button id="startWhisperBtn" class="btn primary-btn mt-3">Start Whisper</button>
          <button id="cancelWhisperBtn" class="btn text-btn mt-2">Cancel</button>
        </div>
      </div>

      <!-- Join Request Modal -->
      <div id="joinModal" class="whisper-modal hidden">
        <div class="glass-panel text-center">
          <h3 style="color: var(--text-primary); font-size: 1.5rem;">🚪 Toc Toc...</h3>
          <p id="joinModalText" style="margin-top: 10px; font-size: 1.1rem;"></p>
          <div style="display:flex; gap:10px; justify-content:center; margin-top:24px;">
            <button id="acceptJoinBtn" class="btn primary-btn" style="background:#22c55e; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);">Aceptar</button>
            <button id="rejectJoinBtn" class="btn text-btn">Ignorar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="ringSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

  <!-- Audio elements containers for LiveKit -->
  <div id="audioElements" style="visibility:hidden; height:0; width:0; overflow:hidden;"></div>

  <script type="module" src="renderer.js?v=18"></script>
</body>
</html>
