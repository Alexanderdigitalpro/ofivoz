<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofivoz | Control de Voz en Tiempo Real</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #040405;
      --glass: rgba(255, 255, 255, 0.045);
      --glass-border: rgba(255, 255, 255, 0.14);
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-purple: #a855f7;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark) !important;
      color: white;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    html {
      background-color: var(--bg-dark) !important;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.5);
    
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
    }

    .mic-btn {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .mic-on {
      background: linear-gradient(135deg, #22c55e 0%, #166534 100%);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
      border-color: rgba(34, 197, 94, 0.6) !important;
    }

    .mic-off {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .grito-active {
      animation: alert-flash 0.5s infinite alternate;
      transform: scale(0.95);
      background: #ef4444 !important;
    }

    @keyframes alert-flash {
      from { box-shadow: 0 0 10px #ef4444; }
      to { box-shadow: 0 0 40px #ef4444; }
    }

    .visualizer-bar {
      transition: height 0.1s ease;
    }

    .bar-active {
      animation: bar-dance 0.6s infinite alternate;
    }

    @keyframes bar-dance {
      0% { height: 10%; }
      50% { height: 60%; }
      100% { height: 90%; }
    }

    .shake {
      animation: buzz 0.5s cubic-bezier(.36,.07,.19,.97) both;
      transform: translate3d(0, 0, 0);
    }

    @keyframes buzz {
      10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-1deg); }
      20%, 80% { transform: translate3d(2px, 0, 0) rotate(1deg); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-1deg); }
      40%, 60% { transform: translate3d(4px, 0, 0) rotate(1deg); }
    }

    .avatar-option {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .avatar-option.selected {
      border-color: var(--accent-purple);
      background: rgba(168, 85, 247, 0.2);
    }

    .color-swatch.selected {
      outline: 2px solid white;
      outline-offset: 2px;
    }

    .tooltip {
      visibility: hidden;
      opacity: 0;
      transition: all 0.2s ease;
    }
    .has-tooltip:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body id="app" class="flex flex-col p-4 md:p-8 h-screen w-screen bg-[#08080a]">

  <!-- LOGIN SCREEN -->
  <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#08080a] p-6 transition-all duration-700">
    <div class="glass rounded-[32px] p-8 w-full max-w-lg text-center border-white/10 shadow-2xl overflow-y-auto max-h-full">
      <h1 class="text-5xl font-black mb-2 tracking-tighter italic">OFI<span class="text-purple-500">VOZ</span></h1>
      <p class="text-[10px] text-gray-500 font-bold mb-6 tracking-widest">VERSIÓN v48</p>
      <p class="text-gray-400 mb-6 font-light italic">Tu oficina remota sin fricciones.</p>
      
      <div class="space-y-6">
        <div>
          <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3 ml-1">Selecciona tu Perfil</label>
          <select id="usernameInput" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-purple-500/50 transition-all appearance-none cursor-pointer">
            <option value="" disabled selected class="bg-[#08080a]">Elegir integrante...</option>
            <option value="Alex" class="bg-[#08080a]">Alex</option>
            <option value="Day" class="bg-[#08080a]">Day</option>
            <option value="Lau" class="bg-[#08080a]">Lau</option>
            <option value="Thir" class="bg-[#08080a]">Thir</option>
          </select>
        </div>

        <div>
          <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3 ml-1">Contraseña</label>
          <input type="password" id="passwordInput" placeholder="••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white placeholder-white/20 focus:outline-none focus:border-purple-500/50 transition-all text-center tracking-[0.5em]">
        </div>

        <button id="joinBtn" class="w-full bg-white text-black font-black py-5 rounded-[24px] hover:bg-purple-500 hover:text-white transition-all transform active:scale-95 shadow-xl shadow-white/5">
          ENTRAR A LA OFICINA
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="workspace" class="flex flex-col gap-6 h-full opacity-0 translate-y-4 transition-all duration-700 hidden">
    
    <!-- TOP BAR -->
    <header class="flex items-center justify-between px-8 py-5 glass rounded-3xl shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
        <span class="text-[10px] font-black tracking-[0.2em] uppercase text-gray-400">En Linea</span>
        <span class="text-[11px] font-bold text-gray-600 bg-white/5 px-2 py-0.5 rounded-full ml-1">v48</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="pipBtn" class="hidden text-[9px] font-black uppercase text-purple-400 bg-purple-500/10 hover:bg-purple-500/20 px-3 py-1.5 rounded-lg border border-purple-500/20 transition-all cursor-pointer">
          Modo Flotante 🔲
        </button>
        <div class="text-right">
          <p id="currentUserDisplay" class="font-bold text-[11px] sm:text-sm leading-none">---</p>
        </div>
        <div id="userAvatarContainer" class="w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg border border-white/20 bg-purple-500/20 text-purple-400 font-black">
          Yo
        </div>
      </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row gap-6 overflow-hidden min-h-0">
      
      <!-- LEFT: ROOMS & USERS -->
      <aside class="flex-1 flex flex-col gap-6 overflow-y-auto pr-2 pb-8">
        
        <!-- GENERAL AREA -->
        <div class="glass rounded-[32px] p-6 lg:p-8">
          <div class="flex items-center justify-between mb-8">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
              Oficina General
            </h3>
          </div>
          <div id="generalUserList" class="grid grid-cols-1 gap-3">
            <!-- Dynamic users list -->
          </div>
        </div>

        <!-- WHISPERS / PRIVATE ROOMS -->
        <div class="flex-1 min-h-[200px]">
          <h3 class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-4 ml-4">Salas Activas</h3>
          <div id="roomsContainer" class="space-y-4">
            <!-- Dynamic sub rooms -->
          </div>
        </div>
      </aside>

      <!-- CONTROLES DERECHA -->
      <aside class="w-full md:w-80 flex flex-col gap-3 shrink-0">
        
        <!-- PANEL DE MICRÓFONO -->
        <div id="micPanel" class="glass rounded-[32px] md:rounded-[40px] flex md:flex-col items-center justify-center p-4 md:p-10 relative overflow-hidden gap-8 md:flex-1">
          
          <div class="flex items-end gap-1.5 h-8 md:h-14 order-2 md:order-1 md:mb-8" id="visualizer">
            <div class="visualizer-bar w-1.5 md:w-2.5 rounded-full bg-purple-400 h-[10%]"></div>
            <div class="visualizer-bar w-1.5 md:w-2.5 rounded-full bg-purple-500 h-[20%]"></div>
            <div class="visualizer-bar w-1.5 md:w-2.5 rounded-full bg-white h-[40%]"></div>
            <div class="visualizer-bar w-1.5 md:w-2.5 rounded-full bg-purple-500 h-[20%]"></div>
            <div class="visualizer-bar w-1.5 md:w-2.5 rounded-full bg-purple-400 h-[10%]"></div>
          </div>

          <div class="flex flex-col items-center gap-3 order-1 md:order-2">
            <button id="muteBtn" class="mic-btn w-16 h-16 md:w-40 md:h-40 rounded-full mic-off flex items-center justify-center border-2 relative z-10">
              <svg class="w-7 h-7 md:w-14 md:h-14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
              </svg>
            </button>
            <span id="micLabel" class="mic-status-pill status-off">MIC OFF</span>
          </div>
        </div>

        <!-- ACCIONES -->
        <div class="grid grid-cols-3 gap-3">
          <div class="glass rounded-3xl p-3 md:p-4 flex items-center justify-center border-white/10">
            <button id="deafenBtn" class="w-12 h-12 md:w-16 md:h-16 bg-green-500 rounded-2xl flex items-center justify-center shadow-lg transition-all active:scale-90 hover:brightness-110">
              <svg id="deafenIconOn" class="w-6 h-6 md:w-7 md:h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
              <svg id="deafenIconOff" class="w-6 h-6 md:w-7 md:h-7 text-white hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
              </svg>
            </button>
          </div>

          <div class="glass rounded-3xl p-3 md:p-4 flex items-center justify-center border-white/10">
            <button id="camBtn" class="w-12 h-12 md:w-16 md:h-16 bg-gray-600 rounded-2xl flex items-center justify-center shadow-lg transition-all active:scale-90 hover:brightness-110">
              <svg id="camIconOn" class="w-6 h-6 md:w-7 md:h-7 text-white hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
              </svg>
              <svg id="camIconOff" class="w-6 h-6 md:w-7 md:h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2.17l.98-1.76c.14-.25.4-.41.69-.41h4.32c.29 0 .55.16.69.41l.98 1.76h2.17c1.1 0 2 .9 2 2v2M22 6l-6 4.6V15l6 4.6V6z"></path>
                <line x1="2" y1="2" x2="22" y2="22"></line>
              </svg>
            </button>
          </div>

          <div class="glass rounded-3xl p-3 md:p-4 flex items-center justify-center border-white/10">
            <button id="gritoBtn" class="w-12 h-12 md:w-16 md:h-16 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg transition-all cursor-pointer hover:brightness-110">
              <svg class="w-6 h-6 md:w-7 md:h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4.5 17h15M12 17V7M6.5 17c0-3 2.5-10 5.5-10s5.5 7 5.5 10"></path>
                <path d="M12 2v2M5 5l1.5 1.5M19 5l-1.5 1.5M4 11h2M18 11h2"></path>
                <circle cx="12" cy="17" r="1.5" fill="currentColor"></circle>
              </svg>
            </button>
          </div>
        </div>

      </aside>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toastNotification" class="fixed bottom-6 right-6 z-[100] hidden transition-all">
    <div class="glass rounded-xl p-4 border-l-4 border-l-purple-500 shadow-xl flex flex-col gap-1">
      <h4 class="text-sm font-bold text-white mb-0">Sistema</h4>
      <p id="toastMessage" class="text-xs text-gray-400 font-medium">Notificación general</p>
    </div>
  </div>

  <!-- JOIN MODAL -->
  <div id="joinModal" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden transition-all">
    <div class="glass rounded-[32px] p-8 max-w-sm text-center border-purple-500/30">
      <div class="w-16 h-16 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center mx-auto mb-4 border border-purple-500/50">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
      </div>
      <h3 class="text-xl font-bold mb-2">🚪 Toc Toc...</h3>
      <p id="joinModalText" class="text-sm text-gray-400 mb-6">Alguien quiere entrar</p>
      
      <div class="flex gap-3">
        <button id="acceptJoinBtn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-all text-sm">Permitir</button>
        <button id="rejectJoinBtn" class="flex-1 bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded-xl transition-all text-sm">Ignorar</button>
      </div>
    </div>
  </div>

  <div id="updateModal" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/80 backdrop-blur-md hidden">
    <div class="glass rounded-[32px] p-8 max-w-sm text-center border-purple-500/50 shadow-[0_0_50px_rgba(168,85,247,0.2)]">
      <div class="w-20 h-20 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center mx-auto mb-6 border border-purple-500/50 animate-bounce">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      </div>
      <h3 class="text-2xl font-black mb-2 italic">NUEVA VERSIÓN</h3>
      <p class="text-sm text-gray-400 mb-8">Hay mejoras críticas disponibles para Ofivoz. Por favor, actualiza ahora.</p>
      <button onclick="window.location.reload()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-purple-500/30 active:scale-95">
        ACTUALIZAR AHORA
      </button>
    </div>
  </div>

  <!-- MAXIMIZE VIDEO MODAL -->
  <div id="videoModal" class="fixed inset-0 z-[300] bg-[#040405] hidden transition-all flex flex-col">
    <div class="flex items-center justify-between p-6">
      <h2 class="text-2xl font-black italic">MODO <span class="text-purple-500">TEATRO</span></h2>
      <button id="closeVideoModal" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all font-black">✕</button>
    </div>
    <div id="videoModalGrid" class="flex-1 p-6 grid gap-6 auto-rows-fr grid-cols-1 md:grid-cols-2 lg:grid-cols-3 place-items-center">
      <!-- Full screen videos will go here -->
    </div>
  </div>

  <audio id="ringSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
  <div id="audioElements" style="visibility:hidden; height:0; width:0; overflow:hidden;"></div>

  <script type="module" src="renderer.js?v=48"></script>
</body>
</html>
